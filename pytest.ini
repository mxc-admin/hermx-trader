[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    integration: tests that touch external services or local operator setup
    okx_paper: gated OKX demo/paper read-only integration tests
    kucoin_paper: gated KuCoin sandbox/paper integration tests
    hyperliquid_paper: gated Hyperliquid testnet integration tests
    bybit_paper: gated Bybit testnet integration tests
    binance_paper: gated Binance testnet integration tests
    bitget_paper: gated Bitget demo integration tests
    gate_paper: gated Gate.io testnet integration tests
