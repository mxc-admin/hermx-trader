# HermX — host-networking fallback compose (legacy).
#
# This is the ORIGINAL deployment shape, kept as a fallback for environments
# where bridge networking + the tailscale sidecar are not desired (e.g. a host
# already running Tailscale Funnel straight to 127.0.0.1:8891). The primary,
# hardened deployment is docker-compose.yml (bridge networking, non-root,
# read-only mounts, tailscale sidecar).
#
# Use with:  docker compose -f docker-compose.host.yml up -d
#
#   receiver  -> src/webhook_receiver.py  (TradingView webhook intake + execution)
#   dashboard -> src/dashboard.py         (operator dashboard; also writes mode overrides)
#
# Both processes bind 127.0.0.1 internally, so we use network_mode: host. This
# also lets Tailscale Funnel forward https://hermx.<tailnet>.ts.net/webhook
# straight to 127.0.0.1:8891 on the host.
#
# Package model: the image is pulled from GHCR, not built locally. Override the
# tag with `HERMX_IMAGE` in .env if needed. network_mode: host is Linux-only.
#
# Operators only need to fill in .env (cp setup/env.example .env) before running:
#   docker compose -f docker-compose.host.yml up -d

services:
  receiver:
    image: ${HERMX_IMAGE:-ghcr.io/mxc-admin/hermx-trader:latest}
    command: ["python", "src/webhook_receiver.py"]
    network_mode: host
    restart: always
    env_file: .env
    environment:
      - HERMX_DATA_DIR=/app/data
    volumes:
      # Secrets / runtime config (owner-only 600 on the host).
      - ./.env:/app/.env:ro
      # Honor host engine-config.json overrides (falls back to baked baseline if absent).
      - ./engine-config.json:/app/engine-config.json:ro
      # Strategy files are operator-editable without rebuilding the image.
      - ./strategies:/app/strategies
      # Append-only ledgers persist across container restarts.
      - hermx-data:/app/logs
      # Mutable state snapshots shared with the dashboard (control-state, etc.).
      - hermx-state:/app/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8891/health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  dashboard:
    image: ${HERMX_IMAGE:-ghcr.io/mxc-admin/hermx-trader:latest}
    command: ["python", "src/dashboard.py"]
    network_mode: host
    restart: always
    env_file: .env
    environment:
      - HERMX_DATA_DIR=/app/data
    depends_on:
      - receiver
    volumes:
      - ./.env:/app/.env:ro
      # Dashboard reads the same ledgers the receiver writes (read-only).
      - hermx-data:/app/logs:ro
      # Shared mutable state: dashboard writes control-state.json here.
      - hermx-state:/app/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8098/health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

volumes:
  # Append-only ledger files (raw-webhooks, signals, order-journal, ...).
  hermx-data:
  # Mutable state snapshots shared by receiver + dashboard (control-state, etc.).
  hermx-state:
